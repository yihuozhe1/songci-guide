# Copy these keys into Streamlit Community Cloud "Advanced settings -> Secrets".
# Do not commit real secrets.

DB_MODE = "auto"

# Prefer the Supabase Session pooler connection string for Streamlit Cloud.
# It usually looks like:
# postgresql://postgres.<project-ref>:<password>@aws-0-<region>.pooler.supabase.com:5432/postgres?sslmode=require
POSTGRES_DSN = "postgresql://postgres.<project-ref>:<password>@aws-0-<region>.pooler.supabase.com:5432/postgres?sslmode=require"

# Optional. If omitted, the app still works and only shows precomputed AI content.
ZHIPU_API_KEY = ""
ZHIPU_MODEL = "glm-5.1"
